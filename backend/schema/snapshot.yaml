version: 1
directus: 11.14.1
vendor: postgres

collections:
  # Bestehende Collections...

  external_providers:
    meta:
      accountability: all
      archive_app_filter: true
      archive_field: status
      archive_value: inactive
      collection: external_providers
      display_template: "{{name}}"
      group: null
      hidden: false
      icon: hub
      note: External Learning Providers
      singleton: false
      unarchive_value: active
    schema:
      name: external_providers

  external_progress:
    meta:
      accountability: all
      archive_app_filter: true
      collection: external_progress
      group: null
      hidden: false
      icon: school
      note: External Learning Progress
      singleton: false
    schema:
      name: external_progress

fields:
  # External Providers
  - collection: external_providers
    field: id
    type: uuid
    meta:
      collection: external_providers
      field: id
      special: uuid
      interface: input
      readonly: true
      hidden: true
      width: full
      required: false
    schema:
      name: id
      table: external_providers
      data_type: uuid
      default_value: gen_random_uuid()
      is_nullable: false
      is_primary_key: true

  - collection: external_providers
    field: name
    type: string
    meta:
      collection: external_providers
      field: name
      interface: input
      note: Provider name (e.g. CodeCombat)
      required: true
      width: full
    schema:
      name: name
      table: external_providers
      data_type: varchar
      max_length: 255
      is_nullable: false

  - collection: external_providers
    field: api_key
    type: string
    meta:
      collection: external_providers
      field: api_key
      interface: input-hash
      options:
        masked: true
      note: API key for provider authentication
      required: true
      width: full
    schema:
      name: api_key
      table: external_providers
      data_type: text
      is_nullable: true

  - collection: external_providers
    field: webhook_secret
    type: string
    meta:
      collection: external_providers
      field: webhook_secret
      interface: input-hash
      options:
        masked: true
      note: Secret for webhook validation
      required: true
      width: full
    schema:
      name: webhook_secret
      table: external_providers
      data_type: text
      is_nullable: true

  - collection: external_providers
    field: base_url
    type: string
    meta:
      collection: external_providers
      field: base_url
      interface: input
      note: Base URL for provider API
      required: true
      width: full
    schema:
      name: base_url
      table: external_providers
      data_type: varchar
      max_length: 255
      is_nullable: false

  - collection: external_providers
    field: status
    type: string
    meta:
      collection: external_providers
      field: status
      interface: select-dropdown
      options:
        choices:
          - text: Active
            value: active
          - text: Inactive
            value: inactive
      display: labels
      width: full
    schema:
      name: status
      table: external_providers
      data_type: varchar
      max_length: 50
      default_value: active
      is_nullable: true

  # External Progress
  - collection: external_progress
    field: id
    type: uuid
    meta:
      collection: external_progress
      field: id
      special: uuid
      interface: input
      readonly: true
      hidden: true
      width: full
    schema:
      name: id
      table: external_progress
      data_type: uuid
      default_value: gen_random_uuid()
      is_nullable: false
      is_primary_key: true

  - collection: external_progress
    field: user_id
    type: uuid
    meta:
      collection: external_progress
      field: user_id
      special: m2o
      interface: select-dropdown-m2o
      required: true
      width: full
    schema:
      name: user_id
      table: external_progress
      data_type: uuid
      is_nullable: true
      foreign_key_table: directus_users
      foreign_key_column: id

  - collection: external_progress
    field: provider_id
    type: uuid
    meta:
      collection: external_progress
      field: provider_id
      special: m2o
      interface: select-dropdown-m2o
      required: true
      width: full
    schema:
      name: provider_id
      table: external_progress
      data_type: uuid
      is_nullable: true
      foreign_key_table: external_providers
      foreign_key_column: id

  - collection: external_progress
    field: external_user_id
    type: string
    meta:
      collection: external_progress
      field: external_user_id
      interface: input
      note: User ID at provider
      required: true
      width: full
    schema:
      name: external_user_id
      table: external_progress
      data_type: varchar
      max_length: 255
      is_nullable: false

  - collection: external_progress
    field: external_level_id
    type: string
    meta:
      collection: external_progress
      field: external_level_id
      interface: input
      note: Level ID at provider
      required: true
      width: full
    schema:
      name: external_level_id
      table: external_progress
      data_type: varchar
      max_length: 255
      is_nullable: false

  - collection: external_progress
    field: status
    type: string
    meta:
      collection: external_progress
      field: status
      interface: select-dropdown
      options:
        choices:
          - text: Completed
            value: completed
          - text: Failed
            value: failed
      display: labels
      width: half
    schema:
      name: status
      table: external_progress
      data_type: varchar
      max_length: 50
      default_value: completed
      is_nullable: true

  # Quest Steps Extension
  - collection: quest_steps
    field: external_id
    type: string
    meta:
      collection: quest_steps
      field: external_id
      interface: input
      note: External level identifier
      width: full
    schema:
      name: external_id
      table: quest_steps
      data_type: varchar
      max_length: 255
      is_nullable: true

  - collection: quest_steps
    field: provider_id
    type: uuid
    meta:
      collection: quest_steps
      field: provider_id
      special: m2o
      interface: select-dropdown-m2o
      note: External provider reference
      width: full
    schema:
      name: provider_id
      table: quest_steps
      data_type: uuid
      is_nullable: true
      foreign_key_table: external_providers
      foreign_key_column: id

relations:
  # External Progress Relations
  - collection: external_progress
    field: user_id
    related_collection: directus_users
    meta:
      junction_field: null
      many_collection: external_progress
      many_field: user_id
      one_allowed_collections: null
      one_collection: directus_users
      one_deselect_action: nullify
      sort_field: null
    schema:
      on_delete: SET NULL

  - collection: external_progress
    field: provider_id
    related_collection: external_providers
    meta:
      junction_field: null
      many_collection: external_progress
      many_field: provider_id
      one_allowed_collections: null
      one_collection: external_providers
      one_deselect_action: nullify
      sort_field: null
    schema:
      on_delete: CASCADE

  # Quest Steps Relations
  - collection: quest_steps
    field: provider_id
    related_collection: external_providers
    meta:
      junction_field: null
      many_collection: quest_steps
      many_field: provider_id
      one_allowed_collections: null
      one_collection: external_providers
      one_deselect_action: nullify
      sort_field: null
    schema:
      on_delete: SET NULL
