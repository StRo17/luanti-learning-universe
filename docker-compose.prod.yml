version: '3.8'

services:
  frontend:
    environment:
      - NODE_ENV=production
    ports:
      - "80:3000"
    build:
      args:
        - NODE_ENV=production

  directus:
    environment:
      - NODE_ENV=production
      - ADMIN_EMAIL=admin@luanti-lms.de
      - KEY=production-secure-key
    volumes:
      - ./backend/uploads:/directus/uploads

  db:
    volumes:
      - db_data:/var/lib/postgresql/data

volumes:
  db_data: