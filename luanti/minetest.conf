# ==================================================================
# Luanti/Minetest Server Configuration
# Luanti Learning Universe - Production Ready
# ==================================================================

# ------------------------------------------------------------------
# SERVER IDENTITY
# ------------------------------------------------------------------
server_name = Luanti Learning Universe
server_description = Open-Source LMS im Voxel-Format
server_address = 
port = 30000
bind_address = 0.0.0.0

# ------------------------------------------------------------------
# ADMIN ACCOUNT
# ------------------------------------------------------------------
# Default Admin Name (wird beim ersten Start erstellt)
name = admin

# ------------------------------------------------------------------
# GAMEPLAY SETTINGS
# ------------------------------------------------------------------
creative_mode = true
enable_damage = false
enable_pvp = false
disable_anticheat = false

# Player Privileges (Standard für neue Spieler)
default_privs = interact, shout

# ------------------------------------------------------------------
# WORLD SETTINGS
# ------------------------------------------------------------------
# Game & World
gameid = minetest
default_game = minetest

# World wird automatisch erstellt, wenn nicht vorhanden
# Der Name muss mit dem --worldname Parameter im docker-compose übereinstimmen
# world_name wird durch CLI Parameter gesetzt

# Map Generator
mg_name = v7
# Seed für reproduzierbare Welten (optional)
# fixed_map_seed = 12345

# ------------------------------------------------------------------
# SECURITY & HTTP API
# ------------------------------------------------------------------
# KRITISCH: Erlaubt dem Mod 'learning_core', HTTP Requests zu machen
secure.http_mods = learning_core
secure.enable_security = true

# Trusted Mods (können auf unsichere Funktionen zugreifen)
secure.trusted_mods = learning_core

# ------------------------------------------------------------------
# PERFORMANCE
# ------------------------------------------------------------------
# Threads für Map-Generierung
num_emerge_threads = 4

# Server-seitige Map-Block-Limits
max_block_generate_distance = 8
max_block_send_distance = 10
max_simultaneous_block_sends_per_client = 10

# Player-Limits
max_users = 50
max_objects_per_block = 64

# Speicher-Optimierungen
sqlite_synchronous = 0
map_save_interval = 60

# ------------------------------------------------------------------
# NETWORK
# ------------------------------------------------------------------
# Timeout für inaktive Clients (Sekunden)
client_unload_timeout = 600

# Bandwidth
max_packets_per_iteration = 1024

# ------------------------------------------------------------------
# LOGGING
# ------------------------------------------------------------------
# Log Level: none, error, warning, action, info, verbose, trace
debug_log_level = action

# Log-Ausgabe (in Docker geht das nach stdout)
# debug_log_size_max = 10

# ------------------------------------------------------------------
# CHATCOMMANDS & MODERATION
# ------------------------------------------------------------------
# Disable Chat Commands die problematisch sein könnten
disable_escape_sequences = true

# Chat Nachrichtenlimit
chat_message_limit_trigger_kick = 50
chat_message_limit_per_10sec = 10

# ------------------------------------------------------------------
# STATIC SPAWN
# ------------------------------------------------------------------
# Spieler spawnen immer am gleichen Ort (für LMS nützlich)
static_spawnpoint = 0, 5, 0

# ------------------------------------------------------------------
# MOD SECURITY (CSM = Client-Side Mods)
# ------------------------------------------------------------------
# Verbiete unsichere Client-Side Mods
enable_client_modding = false

# Server-enforced Texture/Model Check
enable_server_side_chunk_gen = true

# ------------------------------------------------------------------
# INVENTORY
# ------------------------------------------------------------------
# Inventory-Größe (Slots)
default_stack_max = 99

# ------------------------------------------------------------------
# PHYSICS (für Educational Games wichtig)
# ------------------------------------------------------------------
movement_acceleration_default = 3.0
movement_acceleration_air = 2.0
movement_speed_walk = 4.0
movement_speed_crouch = 1.35
movement_speed_fast = 20.0
movement_speed_climb = 3.0
movement_speed_jump = 6.5

# Schwerkraft (Standard: 9.81, niedriger = einfacher für Kinder)
movement_gravity = 9.81

# ------------------------------------------------------------------
# SERVER ANNOUNCEMENTS
# ------------------------------------------------------------------
# Server-Motd (Message of the Day)
motd = Willkommen im Luanti Learning Universe! Viel Spaß beim Lernen!

# Server URL (wird in Client angezeigt)
server_url = https://localhost

# ------------------------------------------------------------------
# RECOMMENDED PRODUCTION SETTINGS
# ------------------------------------------------------------------
# Enable Rollback für Griefing-Protection
enable_rollback_recording = true

# Automatische Mod-Downloads deaktivieren (Security)
enable_mod_channels = false

# Remote Media Server (für Texturen/Sounds - Optional)
# remote_media = http://media.example.com/

# ==================================================================
# WICHTIG FÜR DOCKER:
# - Pfade sind relativ zu /var/lib/minetest/.minetest
# - Config wird als read-only gemountet
# - World-Daten werden in Named Volume gespeichert
# ==================================================================